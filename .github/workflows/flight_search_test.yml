name: Flight Search TEST

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: claude/flight-search-automation-gmsw9
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fli
        run: pip install flights

      - name: Run test search (2 routes)
        run: python search_flights_test.py

      - name: Upload results via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: claude/flight-search-automation-gmsw9
          RESULTS_FILE: results_test.json
        run: python3 upload_results.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flight-results-test
          path: results_test.json
          if-no-files-found: warn
