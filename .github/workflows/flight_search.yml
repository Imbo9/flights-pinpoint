name: Flight Search

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/flight-search-automation-gmsw9

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fli
        run: pip install flights

      - name: Run flight search
        run: python search_flights.py

      - name: Upload results via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: claude/flight-search-automation-gmsw9
        run: |
          CONTENT=$(base64 -w 0 results.json)
          # Get current file SHA if it exists (needed for updates)
          SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/contents/results.json?ref=$BRANCH" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")
          # Build JSON payload
          if [ -n "$SHA" ]; then
            PAYLOAD=$(python3 -c "
import json
print(json.dumps({'message':'chore: update flight search results','content':'$CONTENT','branch':'$BRANCH','sha':'$SHA'}))
")
          else
            PAYLOAD=$(python3 -c "
import json
print(json.dumps({'message':'chore: add flight search results','content':'$CONTENT','branch':'$BRANCH'}))
")
          fi
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/contents/results.json" \
            -d "$PAYLOAD" | python3 -c "import json,sys; r=json.load(sys.stdin); print('OK:', r.get('content',{}).get('name','?'))"

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: flight-results
          path: results.json
          if-no-files-found: warn
